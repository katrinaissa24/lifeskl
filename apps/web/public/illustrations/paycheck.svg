<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A payslip showing gross pay shrinking to net pay after taxes">
  <!-- payslip -->
  <rect x="36" y="22" width="150" height="156" rx="8" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <rect x="36" y="22" width="150" height="30" rx="8" fill="#6b46ff"/>
  <text x="111" y="42" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">PAYSLIP</text>
  <g font-family="Arial, sans-serif" font-size="12" font-weight="700">
    <text x="50" y="76" fill="#181016">Gross pay</text>
    <text x="172" y="76" fill="#181016" text-anchor="end">$2,000</text>
    <line x1="50" y1="86" x2="172" y2="86" stroke="rgba(24,16,22,.2)" stroke-width="2"/>
    <text x="50" y="106" fill="#c2185b">Income tax</text>
    <text x="172" y="106" fill="#c2185b" text-anchor="end">−$200</text>
    <text x="50" y="126" fill="#c2185b">Payroll tax</text>
    <text x="172" y="126" fill="#c2185b" text-anchor="end">−$100</text>
    <line x1="50" y1="138" x2="172" y2="138" stroke="#181016" stroke-width="2.5"/>
    <text x="50" y="160" fill="#1f8a5b" font-size="14">Net pay</text>
    <text x="172" y="160" fill="#1f8a5b" text-anchor="end" font-size="14">$1,700</text>
  </g>
  <!-- arrow to wallet -->
  <path d="M196 100 H244" stroke="#181016" stroke-width="4" stroke-linecap="round"/>
  <path d="M244 100 l-10 -8 m10 8 l-10 8" stroke="#181016" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- wallet -->
  <rect x="252" y="78" width="54" height="44" rx="8" fill="#e3f5ec" stroke="#181016" stroke-width="3"/>
  <rect x="252" y="92" width="54" height="6" fill="#181016"/>
  <text x="279" y="146" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4a3f47" text-anchor="middle">what you</text>
  <text x="279" y="160" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4a3f47" text-anchor="middle">actually get</text>
</svg>
