<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="An ear catching sound waves">
  <!-- sound wave arcs arriving from left -->
  <path d="M52 100 C52 68 72 50 88 50" stroke="#6b46ff" stroke-width="3" stroke-linecap="round"/>
  <path d="M68 100 C68 76 82 62 94 62" stroke="#6b46ff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M84 100 C84 84 92 74 100 74" stroke="#6b46ff" stroke-width="2" stroke-linecap="round"/>
  <!-- ear outer shape -->
  <path d="M160 44 C128 44 110 64 110 100 C110 136 128 158 152 162 C158 163 162 160 162 154 C162 148 158 144 154 142 C146 138 140 128 140 100 C140 72 148 60 160 60 C172 60 182 72 182 86 C182 100 174 110 168 116 C164 120 162 126 162 134 C162 140 166 144 172 144 C178 144 184 138 186 130 C188 120 188 110 188 100 C188 64 178 44 160 44 Z" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- inner ear canal detail -->
  <path d="M152 96 C150 104 152 114 158 118" stroke="#181016" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="160" cy="124" r="4" fill="#efe9ff" stroke="#181016" stroke-width="2.5"/>
  <!-- small lobe bump -->
  <path d="M152 162 C148 170 154 178 162 176 C168 174 168 166 164 162" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- speech bubble -->
  <rect x="198" y="48" width="104" height="56" rx="10" fill="#efe9ff" stroke="#181016" stroke-width="3"/>
  <path d="M210 104 L202 118 L222 104" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- speech bubble dots -->
  <circle cx="228" cy="76" r="6" fill="#6b46ff"/>
  <circle cx="250" cy="76" r="6" fill="#6b46ff"/>
  <circle cx="272" cy="76" r="6" fill="#6b46ff"/>
  <!-- label -->
  <text x="160" y="193" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4a3f47" text-anchor="middle">Active Listening</text>
</svg>
