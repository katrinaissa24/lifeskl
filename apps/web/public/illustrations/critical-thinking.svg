<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A magnifying glass over a lightbulb">
  <!-- lightbulb body -->
  <ellipse cx="148" cy="120" rx="32" ry="34" fill="#6b46ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- lightbulb neck / base -->
  <rect x="136" y="150" width="24" height="10" rx="3" fill="#4a2ed1" stroke="#181016" stroke-width="3"/>
  <rect x="138" y="158" width="20" height="7" rx="3" fill="#4a2ed1" stroke="#181016" stroke-width="2.5"/>
  <!-- base lines (screw base) -->
  <line x1="136" y1="162" x2="160" y2="162" stroke="#181016" stroke-width="2.5" stroke-linecap="round"/>
  <!-- lightbulb highlight arc -->
  <path d="M135 110 Q138 100 148 98" stroke="#efe9ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- check mark inside bulb -->
  <path d="M140 120 L146 127 L158 113" stroke="#fffdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- magnifying glass handle -->
  <line x1="202" y1="155" x2="228" y2="178" stroke="#181016" stroke-width="8" stroke-linecap="round"/>
  <!-- magnifying glass ring -->
  <circle cx="182" cy="106" r="44" fill="#efe9ff" fill-opacity="0.6" stroke="#181016" stroke-width="3"/>
  <circle cx="182" cy="106" r="38" fill="none" stroke="#181016" stroke-width="3"/>

  <!-- question mark floating near top-right of lens -->
  <text x="207" y="78" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ff6f9c" text-anchor="middle" stroke="#181016" stroke-width="1">?</text>

  <!-- label -->
  <text x="160" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Examine Your Ideas</text>
</svg>
