<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="Balance scale weighing needs against wants">
  <!-- stand -->
  <line x1="160" y1="36" x2="160" y2="150" stroke="#181016" stroke-width="5" stroke-linecap="round"/>
  <path d="M120 168 h80 l-10 -18 h-60 Z" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- beam tilted toward needs -->
  <line x1="62" y1="74" x2="258" y2="52" stroke="#181016" stroke-width="5" stroke-linecap="round"/>
  <circle cx="160" cy="62" r="8" fill="#6b46ff" stroke="#181016" stroke-width="3"/>
  <!-- left pan (needs, heavier) -->
  <line x1="62" y1="74" x2="46" y2="110" stroke="#181016" stroke-width="3"/>
  <line x1="62" y1="74" x2="78" y2="110" stroke="#181016" stroke-width="3"/>
  <path d="M34 110 h56 a28 18 0 0 1 -56 0 Z" fill="#6b46ff" stroke="#181016" stroke-width="3"/>
  <text x="62" y="106" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">🏠</text>
  <text x="62" y="152" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#4a2ed1" text-anchor="middle">NEEDS</text>
  <!-- right pan (wants, lighter) -->
  <line x1="258" y1="52" x2="242" y2="88" stroke="#181016" stroke-width="3"/>
  <line x1="258" y1="52" x2="274" y2="88" stroke="#181016" stroke-width="3"/>
  <path d="M230 88 h56 a28 18 0 0 1 -56 0 Z" fill="#ffe6ee" stroke="#181016" stroke-width="3"/>
  <text x="258" y="84" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">🎮</text>
  <text x="258" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#c2185b" text-anchor="middle">WANTS</text>
</svg>
