<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="Two heads connected by a bridge">

  <!-- Left head profile (facing right) -->
  <!-- Neck -->
  <rect x="60" y="138" width="22" height="28" rx="4" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- Head shape -->
  <ellipse cx="71" cy="110" rx="32" ry="36" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- Ear -->
  <ellipse cx="42" cy="112" rx="7" ry="9" fill="#fffdf8" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Eye -->
  <circle cx="78" cy="102" r="4" fill="#181016"/>
  <circle cx="79.5" cy="100.5" r="1.2" fill="#fffdf8"/>
  <!-- Nose (facing right) -->
  <path d="M84 118 Q90 122 84 126" stroke="#181016" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Mouth (slight smile) -->
  <path d="M76 132 Q82 136 87 133" stroke="#181016" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Hair (left) -->
  <path d="M43 95 Q48 62 71 66 Q94 62 103 80" stroke="#181016" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="#181016"/>

  <!-- Right head profile (facing left, mirrored) -->
  <!-- Neck -->
  <rect x="238" y="138" width="22" height="28" rx="4" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- Head shape -->
  <ellipse cx="249" cy="110" rx="32" ry="36" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- Ear -->
  <ellipse cx="278" cy="112" rx="7" ry="9" fill="#fffdf8" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Eye -->
  <circle cx="242" cy="102" r="4" fill="#181016"/>
  <circle cx="240.5" cy="100.5" r="1.2" fill="#fffdf8"/>
  <!-- Nose (facing left) -->
  <path d="M236 118 Q230 122 236 126" stroke="#181016" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Mouth (slight smile) -->
  <path d="M244 132 Q238 136 233 133" stroke="#181016" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Hair (right) -->
  <path d="M277 95 Q272 62 249 66 Q226 62 217 80" stroke="#181016" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="#181016"/>

  <!-- Accent bridge arc connecting both heads -->
  <path d="M103 88 Q160 38 217 88" stroke="#6b46ff" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Small dots along the bridge -->
  <circle cx="130" cy="68" r="3.5" fill="#6b46ff"/>
  <circle cx="160" cy="54" r="3.5" fill="#6b46ff"/>
  <circle cx="190" cy="68" r="3.5" fill="#6b46ff"/>

  <!-- Shared thought bubble above the middle -->
  <!-- Small connector bubbles -->
  <circle cx="152" cy="88" r="4" fill="#efe9ff" stroke="#181016" stroke-width="2.5"/>
  <circle cx="157" cy="79" r="5.5" fill="#efe9ff" stroke="#181016" stroke-width="2.5"/>
  <circle cx="163" cy="70" r="7" fill="#efe9ff" stroke="#181016" stroke-width="2.5"/>
  <!-- Main thought bubble -->
  <rect x="130" y="18" width="60" height="40" rx="12" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- Heart inside thought bubble -->
  <path d="M160 48 C160 48 144 38 144 30 C144 25 148 22 152 24 C154 25 157 27 160 30 C163 27 166 25 168 24 C172 22 176 25 176 30 C176 38 160 48 160 48 Z" fill="#ff6f9c" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Label -->
  <text x="160" y="193" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4a3f47" text-anchor="middle">Empathy</text>

</svg>
