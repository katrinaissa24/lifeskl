<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A brain ringed by sleep, water and exercise icons">

  <!-- central brain body -->
  <ellipse cx="160" cy="100" rx="42" ry="36" fill="#6b46ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- brain left lobe bump -->
  <circle cx="130" cy="90" r="18" fill="#6b46ff" stroke="#181016" stroke-width="3"/>
  <!-- brain right lobe bump -->
  <circle cx="190" cy="90" r="18" fill="#6b46ff" stroke="#181016" stroke-width="3"/>
  <!-- brain top bumps -->
  <circle cx="148" cy="72" r="14" fill="#6b46ff" stroke="#181016" stroke-width="3"/>
  <circle cx="172" cy="72" r="14" fill="#6b46ff" stroke="#181016" stroke-width="3"/>
  <!-- brain center crease line -->
  <path d="M160 70 C156 84 164 96 160 110" stroke="#4a2ed1" stroke-width="2.5" stroke-linecap="round"/>
  <!-- left fold -->
  <path d="M136 88 C140 96 138 106 134 112" stroke="#4a2ed1" stroke-width="2" stroke-linecap="round"/>
  <!-- right fold -->
  <path d="M184 88 C180 96 182 106 186 112" stroke="#4a2ed1" stroke-width="2" stroke-linecap="round"/>
  <!-- brain stem -->
  <rect x="154" y="130" width="12" height="10" rx="4" fill="#6b46ff" stroke="#181016" stroke-width="2.5"/>

  <!-- connecting arcs (dashed) to badges -->
  <path d="M126 78 C104 64 80 62 72 70" stroke="#181016" stroke-width="2.5" stroke-dasharray="2 6" stroke-linecap="round"/>
  <path d="M160 66 C160 48 160 36 160 28" stroke="#181016" stroke-width="2.5" stroke-dasharray="2 6" stroke-linecap="round"/>
  <path d="M194 78 C216 64 240 62 248 70" stroke="#181016" stroke-width="2.5" stroke-dasharray="2 6" stroke-linecap="round"/>

  <!-- SLEEP badge (top-left) -->
  <circle cx="54" cy="54" r="26" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <!-- moon crescent -->
  <path d="M50 44 C44 50 44 60 50 66 C42 64 38 56 40 48 C42 40 50 36 58 38 C54 38 50 40 50 44 Z" fill="#6b46ff" stroke="#181016" stroke-width="2" stroke-linejoin="round"/>
  <!-- Zzz -->
  <text x="60" y="52" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#4a3f47" text-anchor="start">Z</text>
  <text x="64" y="60" font-family="Arial, sans-serif" font-size="8" font-weight="800" fill="#4a3f47" text-anchor="start">z</text>
  <!-- label -->
  <text x="54" y="88" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Sleep</text>

  <!-- WATER badge (top-center) -->
  <circle cx="160" cy="22" r="20" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <!-- water drop shape -->
  <path d="M160 10 C160 10 150 18 150 23 C150 28 154 31 160 31 C166 31 170 28 170 23 C170 18 160 10 160 10 Z" fill="#6b46ff" stroke="#181016" stroke-width="2" stroke-linejoin="round"/>
  <!-- highlight -->
  <circle cx="156" cy="22" r="2" fill="#efe9ff"/>

  <!-- EXERCISE badge (top-right) -->
  <circle cx="266" cy="54" r="26" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <!-- dumbbell -->
  <!-- left weight -->
  <rect x="241" y="49" width="8" height="12" rx="3" fill="#1f8a5b" stroke="#181016" stroke-width="2"/>
  <!-- bar -->
  <rect x="249" y="53" width="18" height="4" rx="2" fill="#181016"/>
  <!-- right weight -->
  <rect x="267" y="49" width="8" height="12" rx="3" fill="#1f8a5b" stroke="#181016" stroke-width="2"/>
  <!-- label -->
  <text x="266" y="88" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Exercise</text>

  <!-- bottom label -->
  <text x="160" y="190" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4a3f47" text-anchor="middle">Body care = brain care</text>

  <!-- water label below badge -->
  <text x="160" y="48" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Hydrate</text>

</svg>
