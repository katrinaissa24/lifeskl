<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A brain reflected in a mirror">

  <!-- ── MAIN BRAIN (left, accent fill) ─────────────────────────── -->
  <!-- brain base blob -->
  <path d="M62 108
    C52 108 44 100 44 90
    C44 82 50 76 58 75
    C58 66 64 59 73 59
    C76 52 84 48 93 50
    C98 44 107 42 115 46
    C122 40 133 40 138 47
    C146 44 152 50 151 58
    C158 60 163 67 161 75
    C168 77 172 85 169 93
    C171 101 166 109 158 110
    C154 118 146 122 138 120
    C133 127 124 128 117 124
    C111 130 101 130 96 124
    C88 127 79 124 75 117
    Z"
    fill="#6b46ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>

  <!-- brain left lobe divider groove -->
  <path d="M83 70 C80 82 81 96 85 108"
    stroke="#4a2ed1" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- brain right lobe divider groove -->
  <path d="M128 56 C132 68 131 84 127 96 C124 104 122 112 124 120"
    stroke="#4a2ed1" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- top center sulcus -->
  <path d="M103 52 C105 62 104 74 106 84"
    stroke="#4a2ed1" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- small folds -->
  <path d="M67 85 C72 81 78 83 76 89"
    stroke="#4a2ed1" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M140 68 C145 64 150 67 148 73"
    stroke="#4a2ed1" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M94 110 C100 106 108 108 106 114"
    stroke="#4a2ed1" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- brain label -->
  <text x="107" y="148" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Your Mind</text>

  <!-- ── LOOP ARROW (pink, center) ──────────────────────────────── -->
  <!-- arc from brain toward mirror (top loop) -->
  <path d="M168 72 C188 52 212 52 228 72"
    stroke="#ff6f9c" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- arrowhead pointing right-down toward mirror -->
  <path d="M228 72 L222 65 M228 72 L221 77"
    stroke="#ff6f9c" stroke-width="3" stroke-linecap="round"/>
  <!-- arc from mirror back to brain (bottom loop) -->
  <path d="M226 118 C210 140 184 140 168 118"
    stroke="#ff6f9c" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- arrowhead pointing left-down toward brain -->
  <path d="M168 118 L174 111 M168 118 L175 123"
    stroke="#ff6f9c" stroke-width="3" stroke-linecap="round"/>

  <!-- ── MIRROR (right) ──────────────────────────────────────────── -->
  <!-- mirror oval glass -->
  <ellipse cx="265" cy="94" rx="30" ry="42" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <!-- mirror frame inner ring -->
  <ellipse cx="265" cy="94" rx="24" ry="36" fill="none" stroke="#181016" stroke-width="1.5"/>
  <!-- mirror handle -->
  <rect x="259" y="134" width="12" height="22" rx="5" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <!-- mirror shine -->
  <line x1="253" y1="66" x2="250" y2="78" stroke="#efe9ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- faint ghost brain outline reflected in mirror -->
  <path d="M251 100
    C247 100 244 97 244 93
    C244 89 247 87 250 86
    C250 82 253 79 257 79
    C259 76 262 75 265 76
    C268 73 272 73 274 77
    C277 75 280 78 279 82
    C282 83 284 87 282 91
    C283 95 281 99 277 100
    C276 104 272 106 269 104
    C267 107 263 107 261 104
    C258 106 255 104 253 101
    Z"
    fill="none" stroke="#6b46ff" stroke-width="1.5" stroke-linejoin="round" opacity="0.45"/>
  <!-- faint sulcus lines in reflection -->
  <path d="M259 81 C258 86 258 93 260 99"
    stroke="#6b46ff" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M270 78 C271 83 271 90 269 96"
    stroke="#6b46ff" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- mirror label -->
  <text x="265" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Reflection</text>

  <!-- ── TITLE LABEL ─────────────────────────────────────────────── -->
  <text x="160" y="190" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#181016" text-anchor="middle">Metacognition — Thinking About Thinking</text>

</svg>
