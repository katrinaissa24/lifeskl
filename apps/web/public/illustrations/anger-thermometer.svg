<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A thermometer cooling from hot to calm">
  <!-- thermometer tube body -->
  <rect x="148" y="32" width="24" height="120" rx="12" fill="#ffe6ee" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- mercury fill (column) -->
  <rect x="154" y="72" width="12" height="76" rx="6" fill="#ff6f9c"/>
  <!-- thermometer bulb -->
  <circle cx="160" cy="160" r="20" fill="#ff6f9c" stroke="#181016" stroke-width="3"/>
  <!-- bulb inner highlight ring -->
  <circle cx="160" cy="160" r="13" fill="#ff6f9c" stroke="#181016" stroke-width="2.5"/>
  <!-- tick marks on tube -->
  <line x1="172" y1="80"  x2="180" y2="80"  stroke="#181016" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="172" y1="100" x2="180" y2="100" stroke="#181016" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="172" y1="120" x2="180" y2="120" stroke="#181016" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="172" y1="140" x2="176" y2="140" stroke="#181016" stroke-width="2.5" stroke-linecap="round"/>
  <!-- HOT label -->
  <text x="195" y="84" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ff6f9c" text-anchor="start">HOT</text>
  <!-- CALM label -->
  <text x="195" y="144" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1f8a5b" text-anchor="start">CALM</text>
  <!-- downward arrow (accent colour) -->
  <line x1="120" y1="58" x2="120" y2="130" stroke="#6b46ff" stroke-width="3" stroke-linecap="round"/>
  <polyline points="110,118 120,134 130,118" stroke="#6b46ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- breath / cooling swirl at top of tube -->
  <path d="M148 36 C140 28 132 34 138 42 C144 50 136 56 128 50" stroke="#6b46ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- snowflake at top -->
  <!-- vertical bar -->
  <line x1="88" y1="22" x2="88" y2="46" stroke="#6b46ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- horizontal bar -->
  <line x1="76" y1="34" x2="100" y2="34" stroke="#6b46ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- diagonal bars -->
  <line x1="79" y1="25" x2="97" y2="43" stroke="#6b46ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="97" y1="25" x2="79" y2="43" stroke="#6b46ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- snowflake tips -->
  <circle cx="88" cy="22" r="2.5" fill="#6b46ff"/>
  <circle cx="88" cy="46" r="2.5" fill="#6b46ff"/>
  <circle cx="76" cy="34" r="2.5" fill="#6b46ff"/>
  <circle cx="100" cy="34" r="2.5" fill="#6b46ff"/>
  <!-- title label -->
  <text x="160" y="16" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#181016" text-anchor="middle">Cool Down</text>
</svg>
