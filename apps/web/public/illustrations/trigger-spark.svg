<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A lit match igniting a spark">
  <!-- match stick body (diagonal, lower-left to upper-right) -->
  <rect x="60" y="80" width="130" height="12" rx="4"
        fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"
        transform="rotate(-30 125 86)"/>
  <!-- match head (dark blob at the tip of the stick) -->
  <ellipse cx="172" cy="52" rx="11" ry="9"
           fill="#4a2ed1" stroke="#181016" stroke-width="3"/>
  <!-- flame on match head -->
  <path d="M166 52 C163 42 168 34 172 30 C176 34 181 42 178 52 Z"
        fill="#ff6f9c" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- fuse: short curved path from match area toward the spark -->
  <path d="M142 108 C148 116 162 122 178 118 C192 114 204 112 212 118"
        stroke="#181016" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- fuse dashes overlay for texture -->
  <path d="M142 108 C148 116 162 122 178 118 C192 114 204 112 212 118"
        stroke="#4a3f47" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 6" fill="none"/>
  <!-- spark burst center -->
  <circle cx="222" cy="118" r="14" fill="#6b46ff" stroke="#181016" stroke-width="3"/>
  <!-- star burst rays (8-point) -->
  <polygon points="222,96 225,109 238,104 228,114 240,122 227,121 228,135 220,124 210,132 213,119 200,116 212,111 208,98 219,107"
           fill="#6b46ff" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- bright center highlight -->
  <circle cx="222" cy="118" r="7" fill="#efe9ff"/>
  <!-- small spark dots around burst -->
  <circle cx="248" cy="100" r="3.5" fill="#ff6f9c" stroke="#181016" stroke-width="2"/>
  <circle cx="255" cy="124" r="2.5" fill="#6b46ff" stroke="#181016" stroke-width="2"/>
  <circle cx="238" cy="140" r="3"   fill="#ff6f9c" stroke="#181016" stroke-width="2"/>
  <circle cx="200" cy="138" r="2.5" fill="#6b46ff" stroke="#181016" stroke-width="2"/>
  <circle cx="192" cy="103" r="2"   fill="#4a2ed1" stroke="#181016" stroke-width="1.5"/>
  <!-- label -->
  <text x="160" y="182" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#4a3f47" text-anchor="middle">Trigger → Response</text>
</svg>
