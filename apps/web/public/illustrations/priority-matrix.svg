<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="The Eisenhower urgency-importance 2x2 grid">
  <!-- axis label: top (Urgent / Not urgent) -->
  <text x="116" y="14" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4a3f47" text-anchor="middle">Urgent</text>
  <text x="234" y="14" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4a3f47" text-anchor="middle">Not Urgent</text>
  <!-- axis label: left side (Important / Not important) rotated -->
  <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4a3f47" text-anchor="middle" transform="rotate(-90) translate(-90 12)">Important</text>
  <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4a3f47" text-anchor="middle" transform="rotate(-90) translate(-155 12)">Not Important</text>
  <!-- top-left cell: DO — accent #6b46ff -->
  <rect x="22" y="20" width="134" height="80" rx="10" fill="#6b46ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="89" y="55" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">Do</text>
  <text x="89" y="76" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#efe9ff" text-anchor="middle">Do it now</text>
  <!-- top-right cell: PLAN — tint #efe9ff -->
  <rect x="164" y="20" width="134" height="80" rx="10" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="231" y="55" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#4a2ed1" text-anchor="middle">Plan</text>
  <text x="231" y="76" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4a3f47" text-anchor="middle">Schedule it</text>
  <!-- bottom-left cell: TRIM — pink tint #ffe6ee -->
  <rect x="22" y="108" width="134" height="80" rx="10" fill="#ffe6ee" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="89" y="143" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ff6f9c" text-anchor="middle">Trim</text>
  <text x="89" y="164" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4a3f47" text-anchor="middle">Delegate it</text>
  <!-- bottom-right cell: DROP — surface #fffdf8 -->
  <rect x="164" y="108" width="134" height="80" rx="10" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="231" y="143" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#181016" text-anchor="middle">Drop</text>
  <text x="231" y="164" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4a3f47" text-anchor="middle">Eliminate it</text>
  <!-- divider lines inside grid -->
  <line x1="22" y1="104" x2="298" y2="104" stroke="#181016" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="20" x2="160" y2="188" stroke="#181016" stroke-width="2.5" stroke-linecap="round"/>
</svg>
