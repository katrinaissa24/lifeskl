<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A body outline with emotion cue markers">
  <!-- torso / body silhouette -->
  <rect x="128" y="88" width="64" height="88" rx="18" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- neck -->
  <rect x="148" y="72" width="24" height="22" rx="8" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- head -->
  <ellipse cx="160" cy="52" rx="26" ry="26" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <!-- shoulders (slight rounding at top of torso) -->
  <path d="M128 100 Q104 92 102 110 Q102 126 122 130" stroke="#181016" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M192 100 Q216 92 218 110 Q218 126 198 130" stroke="#181016" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Cue 1: HEART on chest (pink) ── -->
  <!-- leader line from heart to label -->
  <line x1="160" y1="116" x2="222" y2="104" stroke="#181016" stroke-width="2" stroke-linecap="round"/>
  <!-- heart shape centred on chest -->
  <path d="M153 114 C153 110 158 108 160 112 C162 108 167 110 167 114 C167 118 160 123 160 123 C160 123 153 118 153 114 Z"
        fill="#ff6f9c" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- label -->
  <text x="238" y="108" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="start">Heart racing</text>

  <!-- ── Cue 2: KNOT / SPIRAL on stomach (accent) ── -->
  <!-- leader line -->
  <line x1="152" y1="143" x2="90" y2="136" stroke="#181016" stroke-width="2" stroke-linecap="round"/>
  <!-- knot: small spiral path -->
  <path d="M160 143 C160 139 156 137 154 139 C152 141 153 145 156 146 C159 147 163 145 163 141 C163 136 158 133 153 135"
        stroke="#6b46ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- label -->
  <text x="74" y="140" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="end">Gut knot</text>

  <!-- ── Cue 3: TENSION MARK at jaw / shoulders ── -->
  <!-- leader line from right shoulder area to label -->
  <line x1="192" y1="100" x2="232" y2="72" stroke="#181016" stroke-width="2" stroke-linecap="round"/>
  <!-- tension zigzag mark -->
  <path d="M186 92 L190 86 L185 82 L189 76" stroke="#181016" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- label -->
  <text x="238" y="70" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="start">Tension</text>
</svg>
