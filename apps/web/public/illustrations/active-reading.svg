<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="An open book with a highlighter and question marks">
  <!-- book base shadow -->
  <ellipse cx="160" cy="170" rx="108" ry="8" fill="#efe9ff" opacity="0.6"/>
  <!-- left page -->
  <path d="M60 60 C60 56 63 54 67 54 L152 54 L152 162 C152 162 110 158 67 162 C63 162 60 160 60 156 Z" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- right page -->
  <path d="M260 60 C260 56 257 54 253 54 L168 54 L168 162 C168 162 210 158 253 162 C257 162 260 160 260 156 Z" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- spine -->
  <path d="M152 54 C155 50 165 50 168 54 L168 162 C165 166 155 166 152 162 Z" fill="#6b46ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- left page text lines -->
  <rect x="74" y="74" width="64" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <rect x="74" y="88" width="56" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <!-- left page highlight bar 1 (pink) -->
  <rect x="72" y="102" width="68" height="8" rx="3" fill="#ffe6ee"/>
  <rect x="74" y="103" width="64" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <!-- left page text lines below highlight -->
  <rect x="74" y="118" width="60" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <!-- left page highlight bar 2 (tint) -->
  <rect x="72" y="132" width="68" height="8" rx="3" fill="#ffe6ee"/>
  <rect x="74" y="133" width="60" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <rect x="74" y="148" width="50" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <!-- right page text lines -->
  <rect x="182" y="74" width="64" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <rect x="182" y="88" width="56" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <rect x="182" y="102" width="64" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <!-- right page highlight bar -->
  <rect x="180" y="116" width="68" height="8" rx="3" fill="#ffe6ee"/>
  <rect x="182" y="117" width="60" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <rect x="182" y="132" width="52" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <rect x="182" y="146" width="64" height="6" rx="3" fill="#4a3f47" opacity="0.18"/>
  <!-- highlighter pen body -->
  <rect x="232" y="128" width="16" height="50" rx="6" fill="#ff6f9c" stroke="#181016" stroke-width="3" stroke-linejoin="round" transform="rotate(-32 240 153)"/>
  <!-- highlighter tip -->
  <path d="M219 168 L224 178 L232 173 Z" fill="#181016" stroke="#181016" stroke-width="2" stroke-linejoin="round"/>
  <!-- highlighter cap end -->
  <rect x="248" y="116" width="16" height="12" rx="5" fill="#4a2ed1" stroke="#181016" stroke-width="2.5" stroke-linejoin="round" transform="rotate(-32 256 122)"/>
  <!-- question mark 1 (large, accent) -->
  <text x="96" y="46" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#6b46ff" text-anchor="middle">?</text>
  <!-- question mark 2 (small, accent) -->
  <text x="210" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#6b46ff" text-anchor="middle">?</text>
</svg>
