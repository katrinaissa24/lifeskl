<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="Bloom's six-level thinking pyramid">
  <!-- Band 1: Remember (bottom, widest) -->
  <polygon points="60,188 260,188 240,162 80,162" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="160" y="180" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Remember</text>
  <!-- Band 2: Understand -->
  <polygon points="80,158 240,158 222,132 98,132" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="160" y="150" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Understand</text>
  <!-- Band 3: Apply -->
  <polygon points="98,128 222,128 206,102 114,102" fill="#ddd5ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="160" y="120" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Apply</text>
  <!-- Band 4: Analyze -->
  <polygon points="114,98 206,98 190,72 130,72" fill="#c9bcff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="160" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Analyze</text>
  <!-- Band 5: Evaluate -->
  <polygon points="130,68 190,68 176,42 144,42" fill="#9c82ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="160" y="60" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#fffdf8" text-anchor="middle">Evaluate</text>
  <!-- Band 6: Create (top, narrowest) -->
  <polygon points="144,38 176,38 160,14" fill="#6b46ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <text x="160" y="32" font-family="Arial, sans-serif" font-size="9" font-weight="800" fill="#ffffff" text-anchor="middle">Create</text>
</svg>
