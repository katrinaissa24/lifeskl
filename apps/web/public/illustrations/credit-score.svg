<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="Credit score gauge from 300 to 850">
  <!-- gauge arcs -->
  <path d="M48 156 A112 112 0 0 1 92 67" stroke="#ff6f9c" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M104 60 A112 112 0 0 1 216 60" stroke="#f5c542" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M228 67 A112 112 0 0 1 272 156" stroke="#1f8a5b" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- needle -->
  <g>
    <line x1="160" y1="156" x2="226" y2="92" stroke="#181016" stroke-width="5" stroke-linecap="round"/>
    <circle cx="160" cy="156" r="11" fill="#6b46ff" stroke="#181016" stroke-width="3"/>
  </g>
  <text x="40"  y="184" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#4a3f47">300</text>
  <text x="258" y="184" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#4a3f47">850</text>
  <text x="160" y="120" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#181016" text-anchor="middle">720</text>
  <text x="160" y="138" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1f8a5b" text-anchor="middle">looking good</text>
</svg>
