<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A chat bubble showing tone">
  <!-- background smaller tint bubble (behind) -->
  <rect x="88" y="44" width="164" height="104" rx="22" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- tail for tint bubble -->
  <path d="M118 148 L106 168 L138 148 Z" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>

  <!-- main speech bubble -->
  <rect x="56" y="28" width="172" height="108" rx="22" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- tail for main bubble -->
  <path d="M88 136 L72 164 L116 136 Z" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- cover the internal stroke where tail meets bubble bottom -->
  <rect x="78" y="132" width="46" height="8" fill="#fffdf8"/>

  <!-- smiling face -->
  <circle cx="114" cy="82" r="26" fill="#ffe6ee" stroke="#181016" stroke-width="3"/>
  <!-- eyes -->
  <circle cx="106" cy="76" r="3" fill="#181016"/>
  <circle cx="122" cy="76" r="3" fill="#181016"/>
  <!-- smile -->
  <path d="M106 90 Q114 98 122 90" stroke="#181016" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- sound waveform in accent colour -->
  <!-- bars: short, tall, medium-tall, tall, short — centred around x=196 -->
  <line x1="168" y1="82" x2="168" y2="82" stroke="#6b46ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="168" y1="76" x2="168" y2="88" stroke="#6b46ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="180" y1="66" x2="180" y2="98" stroke="#6b46ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="192" y1="72" x2="192" y2="92" stroke="#6b46ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="204" y1="62" x2="204" y2="102" stroke="#6b46ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="216" y1="72" x2="216" y2="92" stroke="#6b46ff" stroke-width="4" stroke-linecap="round"/>

  <!-- label -->
  <text x="160" y="186" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#4a3f47" text-anchor="middle">Tone in messages</text>
</svg>
