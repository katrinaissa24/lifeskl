<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" role="img" aria-label="A friendly fence marking a limit">

  <!-- ground -->
  <rect x="0" y="162" width="320" height="38" rx="0" fill="#e3f5ec"/>
  <rect x="0" y="162" width="320" height="4" rx="0" fill="#1f8a5b"/>

  <!-- fence posts -->
  <rect x="146" y="90" width="10" height="78" rx="3" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <rect x="178" y="90" width="10" height="78" rx="3" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <rect x="114" y="96" width="10" height="72" rx="3" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <rect x="210" y="96" width="10" height="72" rx="3" fill="#fffdf8" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>

  <!-- fence post caps (triangles) -->
  <polygon points="146,90 156,90 151,80" fill="#6b46ff" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="178,90 188,90 183,80" fill="#6b46ff" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="114,96 124,96 119,86" fill="#6b46ff" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="210,96 220,96 215,86" fill="#6b46ff" stroke="#181016" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- fence rails -->
  <rect x="112" y="108" width="110" height="9" rx="4" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <rect x="112" y="132" width="110" height="9" rx="4" fill="#efe9ff" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>

  <!-- "stop" marker on the fence centre -->
  <circle cx="162" cy="162" r="12" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <line x1="156" y1="162" x2="168" y2="162" stroke="#181016" stroke-width="3" stroke-linecap="round"/>

  <!-- calm figure — left side (safe side) -->
  <!-- body -->
  <rect x="54" y="122" width="22" height="30" rx="8" fill="#ffe6ee" stroke="#181016" stroke-width="3" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="65" cy="112" r="14" fill="#fffdf8" stroke="#181016" stroke-width="3"/>
  <!-- calm face: eyes -->
  <circle cx="60" cy="111" r="1.8" fill="#181016"/>
  <circle cx="70" cy="111" r="1.8" fill="#181016"/>
  <!-- calm smile -->
  <path d="M60 117 Q65 121 70 117" stroke="#181016" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- legs -->
  <line x1="59" y1="152" x2="56" y2="166" stroke="#181016" stroke-width="3" stroke-linecap="round"/>
  <line x1="71" y1="152" x2="74" y2="166" stroke="#181016" stroke-width="3" stroke-linecap="round"/>
  <!-- arms relaxed -->
  <line x1="54" y1="132" x2="42" y2="142" stroke="#181016" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="132" x2="88" y2="142" stroke="#181016" stroke-width="3" stroke-linecap="round"/>

  <!-- label: "My space" on the safe side -->
  <text x="65" y="190" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">My space</text>

  <!-- label: "Boundary" on the fence -->
  <text x="162" y="76" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#6b46ff" text-anchor="middle">Boundary</text>

  <!-- label: on the far side -->
  <text x="268" y="190" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4a3f47" text-anchor="middle">Others' space</text>

</svg>
